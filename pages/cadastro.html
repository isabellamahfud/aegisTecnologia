<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link rel="stylesheet" href="../css/cadastro.css">

</head>

<body data-page="signup">

    <section class="container">

        <div class="form-box">

            <h1>Criar Conta</h1>

            <p>Preencha os dados para se cadastrar</p>

            <div class="message" id="form-message" aria-live="polite"></div>

            <form id="signup-form">

                <input id="signup-name" type="text" placeholder="Nome completo" required>

                <input id="signup-email" type="email" placeholder="E-mail" required>

                <input id="signup-password" type="password" placeholder="Senha" required>

                <input id="signup-password-confirm" type="password" placeholder="Confirmar senha" required>

                <button type="submit">
                    Cadastrar
                </button>

                <span>
                    Já tem conta?
                    <a href="login.html">Entrar</a>
                </span>

            </form>

        </div>

    </section>

    <script type="module" src="../js/firebase-auth.js"></script>
</body>

</html>
