<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="../css/login.css">

</head>

<body data-page="login">
  <a href="../index.html" style="position:fixed;top:12px;left:12px;z-index:9999;display:block;width:64px;height:64px;">
    <img src="../img/aegisTecnologiaLogo.png" alt="Aegis Tecnologia" style="width:100%;height:100%;object-fit:contain;">
  </a>


    <section class="container">

        <div class="form-box">

            <h1>Entrar</h1>

            <p>Acesse sua conta</p>

            <form id="login-form">

                <input id="login-email" type="email" placeholder="E-mail" required>

                <input id="login-password" type="password" placeholder="Senha" required>

                <button type="submit">
                    Login
                </button>

                <span>
                    Não tem conta?
                    <a href="cadastro.html">Cadastrar</a>
                </span>

            </form>

        </div>

    </section>

    <script type="module" src="../js/firebase-auth.js"></script>
    <script src="../js/header.js"></script>
</body>

</html>
